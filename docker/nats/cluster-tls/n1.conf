server_name: n1
port: 4222
http_port: 8222
client_advertise: "n1:4222"

tls {
  cert_file: "/etc/nats/certs/n1.pem"
  key_file: "/etc/nats/certs/n1-key.pem"
  ca_file: "/etc/nats/certs/ca.pem"
  verify: true
}

cluster {
  name: "it-cluster-tls"
  port: 6222
  routes = [
    nats://n2:6222
    nats://n3:6222
  ]
}
